name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Generate standalone index.html
        run: |
          python3 - <<'EOF'
          import glob, os

          css_files = glob.glob('dist/assets/*.css')
          js_files  = glob.glob('dist/assets/*.js')
          css = open(css_files[0]).read() if css_files else ''
          js  = open(js_files[0]).read()

          html = f'''<!doctype html>
          <html lang="ja">
            <head>
              <meta charset="UTF-8" />
              <meta name="viewport" content="width=device-width, initial-scale=1.0" />
              <title>見積書・請求書管理</title>
              <style>
          {css}
              </style>
            </head>
            <body>
              <div id="root"></div>
              <script type="module">
          {js}
              </script>
            </body>
          </html>'''

          with open('index.html', 'w') as f:
              f.write(html)
          print(f'Generated index.html ({os.path.getsize("index.html"):,} bytes)')
          EOF

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
